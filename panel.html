<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <!-- Vista de Login -->
  <div id="login-view" class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <img src="logo.png" alt="Insignia" class="insignia" onerror="this.style.display='none'">
        <h2>Acceso Restringido</h2>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-primary btn-full">Ingresar</button>
      </form>
      <p class="login-footer">Sistema de Gestión Institucional</p>
    </div>
  </div>

  <!-- Vista del Panel (oculta inicialmente) -->
  <div id="dashboard-view" style="display: none;">
    <header class="dashboard-header">
      <div class="brand">
        <h1>Panel de Control</h1>
        <span>Banda de Guerra</span>
      </div>
      <nav>
        <ul>
          <li><a href="horarios.html">Horarios</a></li>
          <li><a href="#" id="logout-btn">Cerrar Sesión</a></li>
        </ul>
      </nav>
    </header>
    <main class="dashboard-main">
      <div class="welcome-card">
        <h2>Bienvenido, <span id="display-usuario"></span></h2>
        <p>Jerarquía: <strong id="display-jerarquia"></strong></p>
      </div>
      <div class="modules-grid">
        <a href="horarios.html" class="module-card">
          <h3>📅 Horarios</h3>
          <p>Gestión de ensayos y formaciones</p>
        </a>
        <!-- Espacio para futuros módulos -->
      </div>
    </main>
  </div>

  <!-- Script principal de login (solo panel.html) -->
  <script src="js/main.js"></script>
</body>
</html>
