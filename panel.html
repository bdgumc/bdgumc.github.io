<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDG · Acceso al Sistema</title>
  <!-- SweetAlert2 CDN para alertas profesionales -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="styles.css">
  <!-- El auth-guard NO se incluye aquí para permitir el acceso sin sesión -->
</head>
<body>
  <!-- Overlay con spinner durante la validación -->
  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <!-- Ícono de ancla institucional (SVG inline) -->
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5">
          <circle cx="12" cy="12" r="10" stroke="#D4AF37" fill="none"/>
          <line x1="12" y1="6" x2="12" y2="22" stroke="#D4AF37"/>
          <path d="M6 12h12" stroke="#D4AF37"/>
          <circle cx="12" cy="12" r="3" fill="#D4AF37"/>
        </svg>
        <h1>Banda de Guerra</h1>
        <h2>Universidad Marítima del Caribe</h2>
      </div>
      <form id="loginForm" novalidate>
        <div class="input-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="INGM-32370953" required autocomplete="off">
          <span class="focus-border"></span>
        </div>
        <div class="input-group">
          <label for="contraseña">Contraseña</label>
          <input type="password" id="contraseña" name="contraseña" placeholder="Contraseña" required>
          <span class="focus-border"></span>
        </div>
        <button type="submit" class="btn-login">Iniciar Sesión</button>
      </form>
      <p class="institucional-text">Sistema de Gestión Interna · Acceso Restringido</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
